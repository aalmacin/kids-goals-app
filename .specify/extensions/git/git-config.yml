# Git Branching Workflow Extension Configuration
# Copied to .specify/extensions/git/git-config.yml on install

# Branch numbering strategy: "sequential" (001, 002, ...) or "timestamp" (YYYYMMDD-HHMMSS)
branch_numbering: sequential

# Commit message used by `git commit` during repository initialization
init_commit_message: "[Spec Kit] Initial commit"

# Auto-commit before/after core commands.
# Set "default" to enable for all commands, then override per-command.
# Each key can be true/false. Message is customizable per-command.
auto_commit:
  default: true
  before_clarify:
    enabled: true
    message: "sk: wip before clarify"
  before_plan:
    enabled: true
    message: "sk: wip before plan"
  before_tasks:
    enabled: true
    message: "sk: wip before tasks"
  before_implement:
    enabled: true
    message: "sk: wip before implement"
  before_checklist:
    enabled: true
    message: "sk: wip before checklist"
  before_analyze:
    enabled: true
    message: "sk: wip before analyze"
  before_taskstoissues:
    enabled: true
    message: "sk: wip before issue sync"
  after_constitution:
    enabled: true
    message: "sk: add constitution"
  after_specify:
    enabled: true
    message: "sk: add spec"
  after_clarify:
    enabled: true
    message: "sk: clarify spec"
  after_plan:
    enabled: true
    message: "sk: add plan"
  after_tasks:
    enabled: true
    message: "sk: add tasks"
  after_implement:
    enabled: true
    message: "sk: implement"
  after_checklist:
    enabled: true
    message: "sk: add checklist"
  after_analyze:
    enabled: true
    message: "sk: analyze"
  after_taskstoissues:
    enabled: true
    message: "sk: sync issues"
